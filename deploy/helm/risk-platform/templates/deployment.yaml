{{- range $name, $component := .Values.components }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "risk-platform.fullname" $ }}-{{ $name }}
  labels:
    {{- include "risk-platform.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ $component.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "risk-platform.name" $ }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: {{ $name }}
    spec:
      serviceAccountName: {{ include "risk-platform.fullname" $ }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile: {type: RuntimeDefault}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $component.image.repository }}:{{ $component.image.tag }}"
          imagePullPolicy: {{ $component.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $component.port }}
          {{- if ne $name "risk-console" }}
          envFrom:
            - configMapRef:
                name: {{ include "risk-platform.fullname" $ }}-{{ $name }}
            - secretRef:
                name: {{ $.Values.existingSecret }}
          readinessProbe:
            httpGet: {path: /actuator/health/readiness, port: http}
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /actuator/health/liveness, port: http}
            initialDelaySeconds: 60
            periodSeconds: 20
          {{- else }}
          env:
            - name: RISK_ADMIN_UPSTREAM
              value: {{ printf "http://%s-risk-admin:8083" (include "risk-platform.fullname" $) | quote }}
            - name: CASDOOR_PUBLIC_URL
              value: {{ $.Values.global.casdoorPublicUrl | quote }}
          readinessProbe:
            httpGet: {path: /, port: http}
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: {path: /, port: http}
            initialDelaySeconds: 15
          {{- end }}
          resources: {{ toYaml $.Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
            readOnlyRootFilesystem: false
{{- end }}
