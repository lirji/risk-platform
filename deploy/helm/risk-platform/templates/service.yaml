{{- range $name, $component := .Values.components }}
{{- if $component.service }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "risk-platform.fullname" $ }}-{{ $name }}
  labels:
    {{- include "risk-platform.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  selector:
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: {{ $name }}
  ports:
    - name: http
      port: {{ $component.port }}
      targetPort: http
{{- end }}
{{- end }}
