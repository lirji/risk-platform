# 本地开发基础设施: MySQL + Redis + Kafka(KRaft) + Elasticsearch
# 起: docker compose up -d   停: docker compose down   清数据: docker compose down -v
services:
  mysql:
    image: mysql:8.0
    container_name: risk-mysql
    # 宿主机映射 13306, 避开本地已占用的 3306 (容器内仍 3306)
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: risk_platform
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: risk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  kafka:
    image: apache/kafka:3.7.0
    container_name: risk-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # 两个客户端 listener: PLAINTEXT 给宿主机进程(localhost:9092),
      # INTERNAL 给 docker 网络内的容器(kafka:29092, 如 Logstash)
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # 自动创建的 topic 默认 3 分区, 避免消费者按 1 分区订阅后漏掉后增分区
      KAFKA_NUM_PARTITIONS: "3"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: risk-es
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: risk-kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: risk-logstash
    depends_on:
      - kafka
      - elasticsearch
    environment:
      # 容器内走 INTERNAL listener 连 Kafka
      KAFKA_BOOTSTRAP: kafka:29092
      ES_HOSTS: http://elasticsearch:9200
      MASK_SALT: risk-platform-demo-salt   # HMAC 脱敏盐, 生产用密管下发
      XPACK_MONITORING_ENABLED: "false"
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro

  # 模型重训调度: 单容器版 (内嵌 H2+ZK), UI http://localhost:12345/dolphinscheduler/ui (admin/dolphinscheduler123)
  dolphinscheduler:
    image: apache/dolphinscheduler-standalone-server:3.2.2
    container_name: risk-dolphinscheduler
    ports:
      - "12345:12345"
    environment:
      TZ: Asia/Shanghai

volumes:
  mysql-data:
  redis-data:
  es-data:
