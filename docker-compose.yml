# 本地开发基础设施: MySQL + Redis + Kafka(KRaft) + Elasticsearch
# 起: docker compose up -d   停: docker compose down   清数据: docker compose down -v
services:
  mysql:
    image: mysql:8.0
    container_name: risk-mysql
    # 宿主机映射 13307, 避开本地已占用的 3306 (容器内仍 3306)
    ports:
      - "13307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: risk_platform
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: risk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  kafka:
    image: apache/kafka:3.7.0
    container_name: risk-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # 两个客户端 listener: PLAINTEXT 给宿主机进程(localhost:9092),
      # INTERNAL 给 docker 网络内的容器(kafka:29092, 如 Logstash)
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # 自动创建的 topic 默认 3 分区, 避免消费者按 1 分区订阅后漏掉后增分区
      KAFKA_NUM_PARTITIONS: "3"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: risk-es
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: risk-kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: risk-logstash
    depends_on:
      - kafka
      - elasticsearch
    environment:
      # 容器内走 INTERNAL listener 连 Kafka
      KAFKA_BOOTSTRAP: kafka:29092
      ES_HOSTS: http://elasticsearch:9200
      MASK_SALT: risk-platform-demo-salt   # HMAC 脱敏盐, 生产用密管下发
      XPACK_MONITORING_ENABLED: "false"
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro

  # 模型重训调度: 单容器版 (内嵌 H2+ZK), UI http://localhost:12345/dolphinscheduler/ui (admin/dolphinscheduler123)
  dolphinscheduler:
    image: apache/dolphinscheduler-standalone-server:3.2.2
    container_name: risk-dolphinscheduler
    ports:
      - "12345:12345"
    environment:
      TZ: Asia/Shanghai

  # ===== 离线层 Hive 栈 (架构 A): profile=hive, 由 ./scripts/setup-hive.sh 拉起 =====
  # 不进默认 `docker compose up`, 避免污染实时栈。MinIO/S3A 当数据存储(存算分离, 不上 HDFS)。

  # 对象存储: 离线宽表 parquet 落 s3a://warehouse/...; 控制台 http://localhost:9001 (minioadmin/minioadmin)
  minio:
    image: minio/minio:latest
    container_name: risk-minio
    profiles: ["hive"]
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  # 一次性建桶 warehouse, 完成即退出
  minio-init:
    image: minio/mc:latest
    container_name: risk-minio-init
    profiles: ["hive"]
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do echo 'waiting minio...'; sleep 2; done;
      mc mb local/warehouse || true;
      echo 'bucket warehouse ready';
      "

  # Hive Metastore (thrift://localhost:9083): 只管元数据, 后端复用 risk-mysql 的 metastore_db。
  # 需 mysql 驱动 jar -> ./scripts/setup-hive.sh 先把它备到 ./libs/mysql-connector-j.jar。
  # 表数据走 Spark 侧 s3a (EXTERNAL 表), metastore 不碰 S3。
  hive-metastore:
    image: apache/hive:4.0.0
    container_name: risk-hive-metastore
    profiles: ["hive"]
    depends_on:
      - mysql
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: mysql
      # 把镜像自带的 S3A jar(在 tools/lib, 默认不在 classpath) 挂上来, 让 metastore 能解析 s3a:// 表目录
      HIVE_AUX_JARS_PATH: /opt/hadoop/share/hadoop/tools/lib/hadoop-aws-3.3.6.jar,/opt/hadoop/share/hadoop/tools/lib/aws-java-sdk-bundle-1.12.367.jar
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=com.mysql.cj.jdbc.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:mysql://mysql:3306/metastore_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
        -Djavax.jdo.option.ConnectionUserName=root
        -Djavax.jdo.option.ConnectionPassword=root123
    volumes:
      - ./libs/mysql-connector-j.jar:/opt/hive/lib/mysql-connector-j.jar:ro
      # S3A 配置(指向 minio:9000), 供 metastore 在 s3a 上建/删表目录
      - ./hive/conf/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro

volumes:
  mysql-data:
  redis-data:
  es-data:
  minio-data:
