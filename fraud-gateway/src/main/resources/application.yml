server:
  # 错开 LangChain4j(8080) / drools-demo(8081)
  port: 8082

spring:
  application:
    name: fraud-gateway
  data:
    redis:
      # 对应 docker-compose 的 redis; 连接参数可用环境变量覆盖
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # 连不上不阻塞启动, 首次取特征失败会被 RedisFeatureClient 降级捕获
      timeout: 200ms
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # 发不出去不要无限阻塞主链路; 约束: delivery.timeout.ms >= request.timeout.ms + linger.ms
      properties:
        max.block.ms: 500
        request.timeout.ms: 1500
        delivery.timeout.ms: 2000

management:
  endpoints:
    web:
      exposure:
        # 暴露 prometheus 抓取端点看 P99 / 命中率
        include: health,prometheus,metrics
  metrics:
    tags:
      application: fraud-gateway
