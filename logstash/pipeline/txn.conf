# transaction.v1 → 清洗 + 脱敏 → ES 时间滚动索引
# 独立 consumer group(logstash-es), 与 profiling-realtime(realtime-feature) 互不影响。

input {
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP:kafka:29092}"
    topics => ["transaction.v1"]
    group_id => "logstash-es"
    auto_offset_reset => "earliest"
    consumer_threads => 3
    codec => json
  }
}

filter {
  # 1) 版本化 envelope 展平；eventTime 是 ISO-8601 事件时间。
  date {
    match => ["eventTime", "ISO8601"]
    target => "@timestamp"
  }

  mutate {
    add_field => {
      "eventId" => "%{[metadata][eventId]}"
      "sourceId" => "%{[metadata][sourceId]}"
      "txnId" => "%{[metadata][txnId]}"
      "correlationId" => "%{[metadata][correlationId]}"
    }
    rename => { "amountMinor" => "amount" }
  }

  # 2) 金额标准化: 分 → 元 (保留原始分值 amount)
  if [amount] {
    ruby { code => "event.set('amount_yuan', event.get('amount').to_f / 100.0)" }
  }

  # 3) 脱敏 - 账号 (§2.6)
  if [accountNo] {
    # HMAC 一致性哈希: 同账号→同值, 可聚合/可关联但不可逆
    fingerprint {
      source => "accountNo"
      target => "acct_hash"
      method => "SHA256"
      key => "${MASK_SALT}"
    }
    # 掩码: 保留前6后4, 中间打码 (Java 正则定长后顾)
    mutate { add_field => { "account_masked" => "%{accountNo}" } }
    mutate { gsub => ["account_masked", "(?<=.{6}).(?=.{4})", "*"] }
    mutate { remove_field => ["accountNo"] }   # 移除明文, ES 不留
  }

  # 4) 脱敏 - 对手方账号
  if [counterpartyAccount] {
    mutate { add_field => { "counterparty_masked" => "%{counterpartyAccount}" } }
    mutate { gsub => ["counterparty_masked", "(?<=.{6}).(?=.{4})", "*"] }
    mutate { remove_field => ["counterpartyAccount"] }
  }

  # 5) 裁剪不入库字段
  mutate { remove_field => ["@version", "eventTime", "event", "metadata"] }
}

output {
  elasticsearch {
    hosts => ["${ES_HOSTS:http://elasticsearch:9200}"]
    # 按日时间滚动索引; mapping 由我们显式的 index template 管理
    index => "txn-%{+YYYY.MM.dd}"
    manage_template => false
  }
}
