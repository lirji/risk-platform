global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: fraud-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["fraud-gateway:8082"]
  - job_name: risk-admin
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["risk-admin:8083"]
  - job_name: decision-log
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["fraud-decision-log:8084"]
  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]
