server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  large_client_header_buffers 4 64k;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ${CASDOOR_PUBLIC_URL}; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

  # 延迟解析上游，避免 Docker 恢复时 risk-admin 尚未注册导致 nginx 直接退出。
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $risk_admin_upstream ${RISK_ADMIN_UPSTREAM};

  # 门户专用健康端点，同时覆盖前端入口与管理后端。
  location = /healthz {
    proxy_pass $risk_admin_upstream/actuator/health;
    proxy_connect_timeout 1s;
    proxy_read_timeout 2s;
    access_log off;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location ~ ^/(api|actuator)/ {
    proxy_pass $risk_admin_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|svg|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
  }
}
